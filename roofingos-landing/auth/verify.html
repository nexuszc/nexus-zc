<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Signing you in — Roofing OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0f1a;color:#fff;
  font-family:-apple-system,sans-serif;
  display:flex;align-items:center;
  justify-content:center;min-height:100vh;
  text-align:center;padding:24px;
}
.spinner{
  width:48px;height:48px;
  border:3px solid rgba(255,255,255,0.1);
  border-top:3px solid #4a9eff;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:0 auto 24px;
}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:22px;font-weight:700;margin-bottom:8px}
p{font-size:14px;color:#6b7280;line-height:1.6;margin-top:8px}
.logo{font-size:20px;font-weight:800;color:#fff;margin-bottom:32px;display:block;text-decoration:none}
.logo span{color:#4a9eff}
</style>
</head>
<body>
<div>
  <a class="logo" href="https://roofingos.dev">Roofing<span>OS</span></a>
  <div class="spinner"></div>
  <h1>Signing you in...</h1>
  <p>Opening your dashboard now.</p>
</div>
<script>
  const hash = window.location.hash.substring(1)
  const hashParams = new URLSearchParams(hash)
  const queryParams = new URLSearchParams(window.location.search)

  const token = hashParams.get('access_token') || queryParams.get('access_token')
  const error = hashParams.get('error') || queryParams.get('error')

  if (error) {
    document.querySelector('h1').textContent = 'Link expired'
    document.querySelector('p').innerHTML =
      'This link has expired.<br>' +
      '<a href="https://roofingos.dev/login" style="color:#4a9eff">Request a new one →</a>'
    document.querySelector('.spinner').style.display = 'none'
  } else {
    window.location.replace(
      'https://app.roofingos.dev/roofing/jobs' +
      window.location.hash +
      (window.location.hash ? '' : window.location.search)
    )
  }
</script>
</body>
</html>
