<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Ops</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  body { background:#0a0a0a; color:#e5e5e5; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:13px; line-height:1.5; margin:0; }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:#0a0a0a; }
  ::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:3px; }
  .card { background:#111; border:1px solid #1e1e1e; border-radius:8px; padding:16px; }
  .row-item { padding:9px 0; border-bottom:1px solid #181818; }
  .row-item:last-child { border-bottom:none; }
  .sec-hdr { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .sec-hdr .lbl { font-size:10px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; white-space:nowrap; }
  .sec-hdr .cnt { font-size:10px; color:#444; }
  .sec-hdr .line { flex:1; height:1px; background:#1e1e1e; }
  .kpi { background:#111; border:1px solid #1e1e1e; border-radius:8px; padding:14px 18px; flex:1; min-width:110px; }
  .kpi .num { font-size:26px; font-weight:700; line-height:1; margin-bottom:4px; }
  .kpi .lbl { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#444; }
  .badge { display:inline-flex; align-items:center; padding:1px 6px; border-radius:3px; font-size:10px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; }
  .dot { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }
  .entry-row { padding:10px 12px; border-radius:5px; background:#0e0e0e; border-left:2px solid #1e1e1e; margin-bottom:5px; }
  .entry-row.hi { border-left-color:#8b5cf6; }
  .entry-row.task { border-left-color:#3b82f6; }
  .fade-in { animation:fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .live-pulse { animation:livePulse 2s ease-in-out infinite; }
  @keyframes livePulse { 0%,100% { opacity:1; box-shadow:0 0 4px #06b6d4; } 50% { opacity:.5; box-shadow:0 0 10px #06b6d4; } }
  mark { background:#3b2f0080; color:#fbbf24; border-radius:2px; padding:0 1px; }
  input[type=text] { background:#111; border:1px solid #2a2a2a; border-radius:5px; padding:5px 12px; color:#e5e5e5; font-size:12px; outline:none; transition:border-color .15s; }
  input[type=text]:focus { border-color:#8b5cf6; }
  .attention-row { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:6px; margin-bottom:6px; }
  @media(max-width:900px) { .grid-3col { grid-template-columns:1fr 1fr !important; } }
  @media(max-width:600px) { .grid-3col,.grid-2col { grid-template-columns:1fr !important; } }
</style>
</head>
<body>

<header style="position:sticky;top:0;z-index:100;background:rgba(10,10,10,.96);backdrop-filter:blur(12px);border-bottom:1px solid #1e1e1e;padding:10px 24px;display:flex;align-items:center;gap:14px;">
  <div style="font-weight:800;font-size:14px;letter-spacing:.1em;color:#a78bfa;white-space:nowrap;">NEXUS OPS</div>
  <input type="text" id="search" placeholder="Search all data…" style="width:260px;" />
  <div style="flex:1"></div>
  <span id="live-ind" style="display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.08em;color:#06b6d4;">
    <span id="live-dot" class="dot live-pulse" style="background:#06b6d4;"></span> LIVE
  </span>
  <span id="hdr-info" style="font-size:11px;color:#444;"></span>
  <button id="refresh-btn" style="background:#111;border:1px solid #2a2a2a;color:#888;padding:5px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;">↻ Refresh</button>
</header>

<div id="app" style="padding:20px 24px;max-width:1600px;margin:0 auto;">
  <div style="text-align:center;padding:80px 0;color:#333;">Loading Nexus Ops…</div>
</div>

<script>
const SB_URL = 'https://koqpbnxkhgbsnbdjwldx.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvcXBibnhraGdic25iZGp3bGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjMwNjYsImV4cCI6MjA5MjQ5OTA2Nn0.b07zF8Uv46x3KDGe9EgvewLLvvSk_riDTsvA2oq_X0g';

const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  entries:[], tasks:[], clients:[], builds:[], reflections:[],
  improvements:[], auditLog:[], abilities:[], actionQueue:[], roofingJobs:[],
  feed:[], search:'', loading:false, lastRefresh:null, countdown:30,
  entryCount:0, taskCount:0,
};

// ── Helpers ───────────────────────────────────────────────────────────────────
const h = s => s == null ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function ago(ts) {
  if (!ts) return '—';
  const s = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  if (s < 604800) return `${Math.floor(s/86400)}d ago`;
  return new Date(ts).toLocaleDateString('en',{month:'short',day:'numeric'});
}

function hl(text, q) {
  if (!q || !text) return h(text);
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return h(text).replace(new RegExp(`(${esc})`,'gi'),'<mark>$1</mark>');
}

function badge(lbl, color, bg) {
  return `<span class="badge" style="background:${bg||'#1e1e1e'};color:${color||'#888'}">${h(lbl)}</span>`;
}

function dot(color) {
  return `<span class="dot" style="background:${color}"></span>`;
}

function secHdr(lbl, cnt, accent) {
  return `<div class="sec-hdr"><span class="lbl" style="color:${accent||'#555'}">${h(lbl)}</span>${cnt!=null?`<span class="cnt">${cnt}</span>`:''}<div class="line"></div></div>`;
}

const STATUS_COLOR = {
  staged:'#a78bfa', deployed:'#10b981', failed:'#ef4444', building:'#f59e0b',
  planned:'#6b7280', testing:'#06b6d4', proposed:'#f59e0b', approved:'#10b981',
  rejected:'#ef4444', live:'#10b981', active:'#10b981', inactive:'#6b7280',
  pending:'#f59e0b', success:'#10b981', failure:'#ef4444', complete:'#10b981',
  in_progress:'#f97316', signed:'#60a5fa', lead:'#6b7280',
  inspection_scheduled:'#f59e0b', proposal_sent:'#3b82f6', invoice_sent:'#a78bfa',
};
const sc = s => STATUS_COLOR[s] || '#888';

const TYPE_COLOR = {
  idea:'#a78bfa', task:'#60a5fa', decision:'#34d399', note:'#666',
  question:'#fbbf24', observation:'#f472b6', meta:'#94a3b8', other:'#555',
};

function clientGroup(c) {
  const dt = (c.deal_type||'').toLowerCase();
  const nm = (c.name||'').toLowerCase();
  if (dt.includes('roof')||nm.includes('roof')) return 'Roofing OS';
  if (dt.includes('refi')||dt.includes('mortgage')||dt.includes('cash_out')||dt.includes('reverse')||nm.includes('refi')||nm.includes('mortgage')) return 'Mortgage / Refi';
  if (dt.includes('va')||dt.includes('agency')||dt.includes('staff')) return 'VA Services';
  if (dt.includes('nexus')||dt.includes('platform')||dt.includes('saas')||dt.includes('software')) return 'Platform';
  return (dt||'other').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}

const GROUP_COLORS = {'Roofing OS':'#f97316','Mortgage / Refi':'#3b82f6','VA Services':'#10b981','Platform':'#a78bfa'};

// ── Data ──────────────────────────────────────────────────────────────────────
async function sq(table, params='') {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
      headers:{ apikey:SB_KEY, Authorization:`Bearer ${SB_KEY}` }
    });
    if (!r.ok) return [];
    return r.json();
  } catch { return []; }
}

async function sqCount(table, filter='') {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?select=id&limit=1${filter?'&'+filter:''}`, {
      headers:{ apikey:SB_KEY, Authorization:`Bearer ${SB_KEY}`, Prefer:'count=exact' }
    });
    const cr = r.headers.get('content-range');
    const total = cr?.split('/')[1];
    return total && total !== '*' ? parseInt(total) : 0;
  } catch { return 0; }
}

async function loadAll() {
  S.loading = true;
  document.getElementById('hdr-info').textContent = 'Refreshing…';

  const [
    entries, tasks, clients, builds, reflections, improvements,
    auditLog, abilities, actionQueue, roofingJobs, entryCount, taskCount
  ] = await Promise.all([
    sq('entries','select=id,content,entry_type,importance,created_at,tags,project_names,people_names,task_status,role&order=created_at.desc&limit=100'),
    sq('entries','select=id,content,created_at,client_id&task_status=eq.open&order=created_at.asc&limit=50'),
    sq('clients','select=*,client_context(*)&order=created_at.desc'),
    sq('nexus_build_manifests','select=id,goal,status,dev_commit_sha,main_commit_sha,created_at&order=created_at.desc&limit=20'),
    sq('nexus_reflections','select=id,cycle_number,observation,insight,action_taken,learned,created_at&order=created_at.desc&limit=10'),
    sq('nexus_self_improvements','select=*&order=directive_priority.asc,created_at.desc&limit=30'),
    sq('nexus_audit_log','select=id,engine,action_type,action_detail,outcome,created_at&order=created_at.desc&limit=50'),
    sq('nexus_ability_proposals','select=*&order=created_at.desc&limit=20'),
    sq('nexus_action_queue','select=*&status=eq.pending&order=created_at.desc&limit=20'),
    sq('roofing_jobs','select=id,homeowner_name,property_address,status,contract_amount,created_at&order=created_at.desc&limit=30'),
    sqCount('entries',''),
    sqCount('entries','task_status=eq.open'),
  ]);

  Object.assign(S, {
    entries:entries||[], tasks:tasks||[], clients:clients||[], builds:builds||[],
    reflections:reflections||[], improvements:improvements||[], auditLog:auditLog||[],
    abilities:abilities||[], actionQueue:actionQueue||[], roofingJobs:roofingJobs||[],
    entryCount:entryCount||0, taskCount:taskCount||0,
  });
  S.feed = [...(auditLog||[]).slice(0,10)];
  S.loading = false;
  S.lastRefresh = new Date();
  S.countdown = 30;
  render();
}

// ── Render sections ───────────────────────────────────────────────────────────

function renderKPIs() {
  const staged = S.builds.filter(b=>b.status==='staged').length;
  const pendImp = S.improvements.filter(i=>['proposed','pending'].includes(i.status)).length;
  const activeClients = S.clients.filter(c=>!['inactive','archived'].includes(c.status)).length;

  const kpis = [
    {lbl:'Entries',     val:S.entryCount||S.entries.length,  color:'#a78bfa', plus: S.entryCount>S.entries.length},
    {lbl:'Open Tasks',  val:S.taskCount||S.tasks.length,     color:S.tasks.length?'#60a5fa':'#10b981', plus: S.taskCount>S.tasks.length},
    {lbl:'Clients',     val:activeClients,                    color:'#10b981'},
    {lbl:'Staged',      val:staged,                           color:staged?'#a78bfa':'#333', urgent:staged>0},
    {lbl:'Improvements',val:pendImp,                          color:pendImp?'#f59e0b':'#333'},
    {lbl:'Pending',     val:S.actionQueue.length,             color:S.actionQueue.length?'#ef4444':'#333', urgent:S.actionQueue.length>0},
    {lbl:'Roofing',     val:S.roofingJobs.length,             color:S.roofingJobs.length?'#f97316':'#333'},
  ];

  return `<div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;">
    ${kpis.map(k=>`<div class="kpi" style="${k.urgent?`border-color:${k.color}40;box-shadow:0 0 10px ${k.color}10`:''}"}>
      <div class="num" style="color:${k.color}">${k.val}${k.plus?'+':''}</div>
      <div class="lbl">${h(k.lbl)}</div>
    </div>`).join('')}
  </div>`;
}

function renderAttentionBanner() {
  const staged = S.builds.filter(b=>b.status==='staged');
  const pending = S.actionQueue;
  if (!staged.length && !pending.length) return '';

  const rows = [
    ...staged.map(b=>`<div class="attention-row" style="background:#1c1432;border:1px solid #a78bfa30;">
      ${dot('#a78bfa')}<span style="font-size:10px;font-weight:700;color:#a78bfa;letter-spacing:.06em;">BUILD STAGED</span>
      <span style="color:#d4d4d4;flex:1;">${h((b.goal||'').slice(0,70))}</span>
      <code style="font-size:10px;color:#555;font-family:monospace;">deploy build ${(b.id||'').slice(0,8)}</code>
      <span style="font-size:10px;color:#444;">${ago(b.created_at)}</span>
    </div>`),
    ...pending.map(a=>`<div class="attention-row" style="background:#1a1010;border:1px solid #ef444430;">
      ${dot('#ef4444')}<span style="font-size:10px;font-weight:700;color:#ef4444;letter-spacing:.06em;">ACTION PENDING</span>
      <span style="color:#d4d4d4;flex:1;">${h((a.action_summary||'').slice(0,70))}</span>
      <span style="font-size:10px;color:#444;">${ago(a.created_at)}</span>
    </div>`),
  ].join('');

  return `<div style="margin-bottom:16px;">${secHdr('⚡ Attention Required', null, '#ef4444')}${rows}</div>`;
}

function feedItemHTML(e) {
  const oc = e.outcome==='success'?'#10b981':e.outcome==='failure'?'#ef4444':'#555';
  return `<div class="row-item" style="display:flex;gap:10px;align-items:flex-start;">
    ${dot(oc)}
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;">
        <span style="font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em;">${h(e.engine||'system')}</span>
        <span style="font-size:10px;color:#333;">${h(e.action_type||'')}</span>
        <span style="margin-left:auto;font-size:10px;color:#2e2e2e;white-space:nowrap;">${ago(e.created_at)}</span>
      </div>
      <div style="font-size:12px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h((e.action_detail||'').slice(0,120))}</div>
    </div>
  </div>`;
}

function renderActivityFeed() {
  const items = S.feed.length
    ? S.feed.map(feedItemHTML).join('')
    : '<div style="padding:20px 0;text-align:center;color:#2e2e2e;font-size:12px;">No activity yet</div>';
  return `<div class="card">
    ${secHdr('Live Activity Feed','','#06b6d4')}
    <div id="live-feed">${items}</div>
  </div>`;
}

function renderTasks(q) {
  const shown = q ? S.tasks.filter(t=>t.content?.toLowerCase().includes(q)) : S.tasks;
  const items = shown.length ? shown.map(t=>`
    <div class="row-item" style="display:flex;gap:10px;align-items:flex-start;">
      <div style="width:13px;height:13px;border:1.5px solid #3b82f6;border-radius:3px;flex-shrink:0;margin-top:1px;"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;color:#d4d4d4;line-height:1.5;">${hl(t.content,q)}</div>
        <div style="font-size:10px;color:#3a3a3a;margin-top:2px;">${ago(t.created_at)}</div>
      </div>
    </div>`).join('')
    : '<div style="padding:16px 0;text-align:center;color:#2e2e2e;font-size:12px;">No open tasks</div>';
  return `<div class="card">${secHdr('Open Tasks',shown.length,'#60a5fa')}${items}</div>`;
}

function renderBuilds() {
  const items = S.builds.slice(0,10).map(b=>{
    const col = sc(b.status);
    const sha = (b.main_commit_sha||b.dev_commit_sha||'').slice(0,8);
    return `<div class="row-item">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
        ${dot(col)}<span style="font-size:10px;font-weight:700;color:${col};text-transform:uppercase;letter-spacing:.04em;">${h(b.status)}</span>
        <span style="font-size:10px;color:#2e2e2e;margin-left:auto;">${ago(b.created_at)}</span>
      </div>
      <div style="font-size:12px;color:#c0c0c0;margin-bottom:2px;">${h((b.goal||'').slice(0,80))}</div>
      ${sha?`<div style="font-size:10px;color:#3a3a3a;font-family:monospace;">${sha}</div>`:''}
    </div>`;
  }).join('') || '<div style="padding:16px 0;text-align:center;color:#2e2e2e;font-size:12px;">No builds</div>';
  return `<div class="card">${secHdr('Builds',S.builds.length,'#a78bfa')}${items}</div>`;
}

function renderImprovements() {
  const pending = S.improvements.filter(i=>['proposed','pending','in_progress'].includes(i.status));
  const CXCOL = {low:'#10b981',medium:'#f59e0b',high:'#ef4444'};
  const items = pending.slice(0,8).map(i=>`
    <div class="row-item">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
        ${i.directive_priority?`<span style="font-size:10px;font-weight:700;color:#a78bfa;">P${i.directive_priority}</span>`:''}
        <span style="font-size:11px;font-weight:600;color:#d4d4d4;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h(i.title||'')}</span>
        ${i.complexity?`<span style="font-size:10px;color:${CXCOL[i.complexity]||'#888'}">${h(i.complexity)}</span>`:''}
      </div>
      <div style="font-size:11px;color:#555;line-height:1.4;">${h((i.problem||'').slice(0,80))}</div>
      <div style="font-size:10px;color:#333;margin-top:2px;">${ago(i.created_at)}</div>
    </div>`).join('')
    || '<div style="padding:16px 0;text-align:center;color:#2e2e2e;font-size:12px;">No pending improvements</div>';
  return `<div class="card">${secHdr('Self-Improvements',pending.length,'#f59e0b')}${items}</div>`;
}

function renderReflections() {
  const items = S.reflections.slice(0,6).map(r=>`
    <div class="row-item">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        ${r.cycle_number?`<span style="font-size:10px;font-weight:700;color:#10b981;">Cycle ${r.cycle_number}</span>`:''}
        <span style="font-size:10px;color:#2e2e2e;margin-left:auto;">${ago(r.created_at)}</span>
      </div>
      ${r.insight?`<div style="font-size:12px;color:#d4d4d4;line-height:1.4;margin-bottom:3px;">${h((r.insight||'').slice(0,100))}</div>`:''}
      ${r.learned?`<div style="font-size:11px;color:#10b981;font-style:italic;">${h((r.learned||'').slice(0,80))}</div>`:''}
    </div>`).join('')
    || '<div style="padding:16px 0;text-align:center;color:#2e2e2e;font-size:12px;">No reflections yet</div>';
  return `<div class="card">${secHdr('Reflections',S.reflections.length,'#10b981')}${items}</div>`;
}

function renderClients(q) {
  if (!S.clients.length) return '';
  const filtered = q
    ? S.clients.filter(c=>c.name?.toLowerCase().includes(q)||c.deal_type?.toLowerCase().includes(q)||(c.client_context?.[0]?.core_offer||'').toLowerCase().includes(q))
    : S.clients;

  const groups = {};
  for (const c of filtered) {
    const g = clientGroup(c);
    if (!groups[g]) groups[g]=[];
    groups[g].push(c);
  }

  const ORDER = ['Roofing OS','Mortgage / Refi','VA Services','Platform'];
  const sorted = [...ORDER.filter(g=>groups[g]),...Object.keys(groups).filter(g=>!ORDER.includes(g))];

  const groupHTML = sorted.map(gName=>{
    const list = groups[gName];
    const accent = GROUP_COLORS[gName]||'#888';
    const cards = list.map(c=>{
      const ctx = c.client_context?.[0]||{};
      const hc = c.health_score;
      const hcol = hc>=80?'#10b981':hc>=60?'#f59e0b':hc?'#ef4444':'#333';
      const lastAct = c.last_activity_at||c.health_updated_at;
      return `<div style="background:#161616;border:1px solid #1e1e1e;border-top:2px solid ${accent}30;border-radius:6px;padding:12px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
          <div style="font-weight:600;font-size:13px;">${hl(c.name||'',q)}</div>
          ${hc?`<div style="font-size:14px;font-weight:700;color:${hcol};">${hc}</div>`:''}
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;">
          ${c.deal_type?badge(c.deal_type.replace(/_/g,' '),accent,accent+'18'):''}
          ${c.status&&c.status!=='active'?badge(c.status,sc(c.status),sc(c.status)+'18'):''}
          ${c.monthly_fee?`<span style="font-size:11px;color:#10b981;">$${Number(c.monthly_fee).toLocaleString()}/mo</span>`:''}
          ${c.rev_share_pct?`<span style="font-size:11px;color:#10b981;">${c.rev_share_pct}% rev</span>`:''}
        </div>
        ${ctx.core_offer?`<div style="font-size:11px;color:#555;line-height:1.4;margin-bottom:5px;">${h((ctx.core_offer||'').slice(0,80))}</div>`:''}
        <div style="font-size:10px;color:#333;">${lastAct?`Active ${ago(lastAct)}`:'No activity recorded'}</div>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="width:10px;height:10px;border-radius:2px;background:${accent};display:inline-block;flex-shrink:0;"></span>
        <span style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:${accent};">${h(gName)}</span>
        <span style="font-size:10px;color:#444;">${list.length}</span>
        <div style="flex:1;height:1px;background:#1e1e1e;"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;">${cards}</div>
    </div>`;
  }).join('');

  return `<div class="card" style="margin-bottom:16px;">${secHdr('Clients',filtered.length,'#10b981')}${groupHTML}</div>`;
}

function renderAbilities() {
  const pending = S.abilities.filter(a=>['pending','proposed','building','testing'].includes(a.status));
  if (!pending.length) return '';
  const items = pending.map(a=>`
    <div class="row-item" style="display:flex;align-items:center;gap:10px;">
      ${dot(sc(a.status))}
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:12px;color:#ec4899;">${h(a.ability_name||'')}</div>
        <div style="font-size:11px;color:#555;">${h((a.description||'').slice(0,80))}</div>
      </div>
      ${badge(a.status,sc(a.status),sc(a.status)+'20')}
      <span style="font-size:10px;color:#333;white-space:nowrap;">${ago(a.created_at)}</span>
    </div>`).join('');
  return `<div class="card" style="margin-bottom:16px;">${secHdr('Ability Proposals',pending.length,'#ec4899')}${items}</div>`;
}

function renderRoofingJobs(q) {
  if (!S.roofingJobs.length) return '';
  const filtered = q
    ? S.roofingJobs.filter(j=>j.homeowner_name?.toLowerCase().includes(q)||j.property_address?.toLowerCase().includes(q))
    : S.roofingJobs;
  if (!filtered.length) return '';

  const STEPS = ['lead','inspection_scheduled','proposal_sent','signed','in_progress','invoice_sent','complete'];
  const rows = filtered.map(j=>{
    const step = STEPS.indexOf(j.status);
    const pct = step>=0?Math.round(((step+1)/STEPS.length)*100):0;
    const col = j.status==='complete'?'#10b981':j.status==='in_progress'?'#f97316':'#f59e0b';
    return `<div class="row-item">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:12px;">${hl(j.homeowner_name||'',q)}</div>
          <div style="font-size:11px;color:#555;">${hl(j.property_address||'',q)}</div>
        </div>
        ${j.contract_amount?`<span style="font-size:12px;font-weight:700;color:#10b981;">$${Number(j.contract_amount).toLocaleString()}</span>`:''}
        ${badge((j.status||'').replace(/_/g,' '),col,col+'20')}
        <span style="font-size:10px;color:#333;white-space:nowrap;">${ago(j.created_at)}</span>
      </div>
      <div style="height:3px;background:#1e1e1e;border-radius:2px;overflow:hidden;">
        <div style="width:${pct}%;height:100%;background:${col};border-radius:2px;"></div>
      </div>
    </div>`;
  }).join('');
  return `<div class="card" style="margin-bottom:16px;">${secHdr('Roofing Jobs',filtered.length,'#f97316')}${rows}</div>`;
}

function renderEntries(q) {
  const shown = q
    ? S.entries.filter(e=>e.content?.toLowerCase().includes(q)||(e.tags||[]).some(t=>t.toLowerCase().includes(q))||(e.project_names||[]).some(p=>p.toLowerCase().includes(q)))
    : S.entries.slice(0,50);

  const rows = shown.slice(0,50).map(e=>{
    const tc = TYPE_COLOR[e.entry_type]||'#555';
    const isTask = e.task_status==='open';
    const isHigh = e.importance>=8;
    return `<div class="entry-row ${isHigh?'hi':isTask?'task':''}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        <span style="font-size:10px;font-weight:600;color:${tc};border:1px solid ${tc}30;padding:0 4px;border-radius:2px;text-transform:uppercase;letter-spacing:.04em;">${h(e.entry_type||'note')}</span>
        ${e.importance?`<span style="font-size:10px;color:#444;">${e.importance}/10</span>`:''}
        ${e.role==='assistant'?`<span style="font-size:10px;color:#6b4fa8;font-style:italic;">nexus</span>`:''}
        <span style="font-size:10px;color:#2e2e2e;margin-left:auto;">${ago(e.created_at)}</span>
      </div>
      <div style="font-size:12px;color:#c0c0c0;line-height:1.5;">${hl((e.content||'').slice(0,300),q)}</div>
      ${e.tags?.length?`<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:3px;">${e.tags.map(t=>`<span style="font-size:10px;color:#333;background:#161616;padding:0 5px;border-radius:2px;">#${h(t)}</span>`).join('')}</div>`:''}
      ${(e.project_names?.length||e.people_names?.length)?`<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:3px;">${(e.project_names||[]).map(n=>`<span style="font-size:10px;color:#5a6a7a;background:#161616;padding:0 5px;border-radius:2px;">${h(n)}</span>`).join('')}${(e.people_names||[]).map(n=>`<span style="font-size:10px;color:#7a5a00;background:#161616;padding:0 5px;border-radius:2px;">${h(n)}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('') || '<div style="padding:20px;text-align:center;color:#2e2e2e;">No entries found</div>';

  const lbl = shown.length < S.entries.length ? `${shown.length} of ${S.entryCount||S.entries.length}` : shown.length;
  return `<div class="card" style="margin-bottom:16px;">${secHdr('Memory / Entries',lbl,'#a78bfa')}${rows}</div>`;
}

function renderAuditLog(q) {
  const shown = q
    ? S.auditLog.filter(e=>e.action_detail?.toLowerCase().includes(q)||e.engine?.toLowerCase().includes(q)||e.action_type?.toLowerCase().includes(q))
    : S.auditLog;

  const rows = shown.map(e=>{
    const oc = e.outcome==='success'?'#10b981':e.outcome==='failure'?'#ef4444':'#444';
    return `<div class="row-item" style="display:flex;gap:10px;align-items:flex-start;">
      ${dot(oc)}
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;">
          <span style="font-size:10px;font-weight:700;color:#444;letter-spacing:.06em;">${h(e.engine||'system')}</span>
          <span style="font-size:10px;color:#2e2e2e;">${h(e.action_type||'')}</span>
          <span style="margin-left:auto;font-size:10px;color:#222;white-space:nowrap;">${ago(e.created_at)}</span>
        </div>
        <div style="font-size:11px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${hl((e.action_detail||'').slice(0,120),q)}</div>
      </div>
    </div>`;
  }).join('') || '<div style="padding:16px;text-align:center;color:#2e2e2e;">No audit log entries</div>';

  return `<div class="card" style="margin-bottom:16px;">${secHdr('Audit Log',shown.length,'#444')}
    <div style="max-height:380px;overflow-y:auto;">${rows}</div>
  </div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const q = S.search.toLowerCase().trim();
  document.getElementById('app').innerHTML = `<div class="fade-in">
    ${renderKPIs()}
    ${renderAttentionBanner()}
    <div class="grid-2col" style="display:grid;grid-template-columns:1fr 360px;gap:14px;margin-bottom:14px;">
      ${renderActivityFeed()}
      ${renderTasks(q)}
    </div>
    <div class="grid-3col" style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;">
      ${renderBuilds()}
      ${renderImprovements()}
      ${renderReflections()}
    </div>
    ${renderClients(q)}
    ${renderAbilities()}
    ${renderRoofingJobs(q)}
    ${renderEntries(q)}
    ${renderAuditLog(q)}
  </div>`;
  updateHdr();
}

function updateHdr() {
  const el = document.getElementById('hdr-info');
  if (!el) return;
  if (S.loading) { el.textContent='Refreshing…'; el.style.color='#a78bfa'; }
  else if (S.lastRefresh) { el.textContent=`Updated ${ago(S.lastRefresh)} · ${S.countdown}s`; el.style.color='#444'; }
}

// ── Realtime subscription ─────────────────────────────────────────────────────
db.channel('nexus-ops-v2')
  .on('postgres_changes',{event:'INSERT',schema:'public',table:'nexus_audit_log'},(payload)=>{
    S.feed.unshift(payload.new);
    S.feed = S.feed.slice(0,10);
    const el = document.getElementById('live-feed');
    if (el) el.innerHTML = S.feed.map(feedItemHTML).join('');
  })
  .subscribe(status=>{
    const d = document.getElementById('live-dot');
    if (d) d.style.background = status==='SUBSCRIBED'?'#06b6d4':'#444';
  });

// ── Auto-refresh countdown ────────────────────────────────────────────────────
setInterval(()=>{
  if (!S.loading) {
    S.countdown = Math.max(0, S.countdown-1);
    updateHdr();
    if (S.countdown===0) loadAll();
  }
}, 1000);

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e=>{
  S.search = e.target.value;
  render();
});

document.getElementById('refresh-btn').addEventListener('click', loadAll);

// ── Init ──────────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
