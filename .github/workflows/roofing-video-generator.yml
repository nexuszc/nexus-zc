name: Roofing OS Video Generator

on:
  workflow_dispatch:
    inputs:
      content_id:
        description: 'roofing_content row ID'
        required: true
      audio_url:
        description: 'MP3 URL from Supabase Storage'
        required: true
      title:
        description: 'Video title'
        required: true
      hook_text:
        description: 'Hook text for first 5 seconds'
        required: true
      thumbnail_text:
        description: '3-5 word thumbnail overlay'
        required: false
        default: 'ROOFING OS'
      format:
        description: 'short or long'
        required: false
        default: 'short'

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CONTENT_ID:      ${{ inputs.content_id }}
      AUDIO_URL:       ${{ inputs.audio_url }}
      TITLE:           ${{ inputs.title }}
      HOOK_TEXT:       ${{ inputs.hook_text }}
      THUMBNAIL_TEXT:  ${{ inputs.thumbnail_text }}
      FORMAT:          ${{ inputs.format }}
      SUPABASE_URL:    https://koqpbnxkhgbsnbdjwldx.supabase.co
      WEBHOOK_URL:     https://koqpbnxkhgbsnbdjwldx.supabase.co/functions/v1/roofing-video-webhook
      FONT:            /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
      FONT_REG:        /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu wget curl python3

      - name: Download audio
        run: |
          wget -q -O audio.mp3 "$AUDIO_URL"
          RAW_DURATION=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 audio.mp3)
          MAX_DURATION=$([ "$FORMAT" = "short" ] && echo "30" || echo "180")
          DURATION=$(python3 -c "print(min(float('$RAW_DURATION'), $MAX_DURATION))")
          echo "DURATION=$DURATION" >> $GITHUB_ENV
          echo "Audio downloaded — raw: ${RAW_DURATION}s → capped to: ${DURATION}s (max: ${MAX_DURATION}s for format: $FORMAT)"

      - name: Prepare text files
        run: |
          python3 << 'PYEOF'
          import textwrap, os

          fmt        = os.environ.get('FORMAT', 'short')
          hook       = os.environ.get('HOOK_TEXT', '')
          title      = os.environ.get('TITLE', '')
          thumb      = os.environ.get('THUMBNAIL_TEXT', 'ROOFING OS')

          # Wrap widths tuned per format so text fits on screen
          if fmt == 'short':
              hook_wrap  = 20   # 80px font on 1080px canvas
              title_wrap = 26   # 60px font on 1080px canvas
              thumb_wrap = 18
          else:
              hook_wrap  = 40   # 70px font on 1920px canvas
              title_wrap = 54   # 60px font on 1920px canvas
              thumb_wrap = 40

          with open('hook.txt',  'w') as f: f.write(textwrap.fill(hook,  hook_wrap))
          with open('title.txt', 'w') as f: f.write(textwrap.fill(title, title_wrap))
          with open('thumb.txt', 'w') as f: f.write(textwrap.fill(thumb, thumb_wrap))
          with open('cta.txt',   'w') as f: f.write('roofingos.dev')
          with open('cta2.txt',  'w') as f: f.write('Free 14-day trial')

          print("Text files written")
          print(f"  hook.txt:  {open('hook.txt').read()!r}")
          print(f"  title.txt: {open('title.txt').read()!r}")
          PYEOF

      - name: Generate video
        run: |
          python3 - << 'PYEOF'
          import os

          fmt      = os.environ.get('FORMAT', 'short')
          font     = os.environ.get('FONT', '/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf')
          font_reg = os.environ.get('FONT_REG', '/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf')
          duration = float(os.environ.get('DURATION', '60'))

          if fmt == 'short':
              w, h = 1080, 1920
              hook_sz, title_sz, cta_sz = 80, 60, 70
          else:
              w, h = 1920, 1080
              hook_sz, title_sz, cta_sz = 70, 60, 60

          hook_end  = 5.0
          cta_start = max(duration - 5.0, 5.0)

          with open('video_params.sh', 'w') as f:
              f.write(f"W={w}\nH={h}\nDURATION={duration}\n")

          # drawbox does not support h/w variables — compute literal pixel values
          box_y  = int(h * 0.77)
          box_h  = int(h * 0.17)
          cta_y  = int(h * 0.82)
          cta2_y = int(h * 0.91)

          fc = (
              f"[0:v]"
              f"drawtext=fontfile='{font}':textfile=hook.txt:fontsize={hook_sz}:fontcolor=white:x=(w-text_w)/2:y=(h-text_h)/2:enable='between(t\\,0\\,{hook_end})',"
              f"drawtext=fontfile='{font}':textfile=title.txt:fontsize={title_sz}:fontcolor=white:x=(w-text_w)/2:y=(h-text_h)/2:enable='between(t\\,{hook_end}\\,{cta_start})',"
              f"drawbox=x=0:y={box_y}:w={w}:h={box_h}:color=black@0.6:t=fill:enable='gte(t\\,{cta_start})',"
              f"drawtext=fontfile='{font}':textfile=cta.txt:fontsize={cta_sz}:fontcolor=0x06b6d4:x=(w-text_w)/2:y={cta_y}:enable='gte(t\\,{cta_start})',"
              f"drawtext=fontfile='{font_reg}':textfile=cta2.txt:fontsize=36:fontcolor=white@0.85:x=(w-text_w)/2:y={cta2_y}:enable='gte(t\\,{cta_start})'"
              f"[vout]"
          )

          with open('filter.txt', 'w') as f:
              f.write(fc)

          print(f"Canvas: {w}x{h}  duration: {duration}s  cta_start: {cta_start}s")
          print(f"filter.txt written ({len(fc)} chars)")
          PYEOF

          source video_params.sh

          ffmpeg -y \
            -f lavfi -i "color=c=black:size=${W}x${H}:rate=30:duration=${DURATION}" \
            -i audio.mp3 \
            -filter_complex_script filter.txt \
            -map "[vout]" \
            -map 1:a \
            -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p \
            -c:a aac -b:a 128k \
            -t "$DURATION" \
            -shortest \
            output.mp4

          SIZE=$(du -sh output.mp4 | cut -f1)
          echo "VIDEO_SIZE=$SIZE" >> $GITHUB_ENV
          echo "Video generated: $SIZE"

      - name: Upload to Supabase Storage
        id: upload
        run: |
          UPLOAD_RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/storage/v1/object/roofing-videos/${CONTENT_ID}.mp4" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: video/mp4" \
            -H "x-upsert: true" \
            --data-binary @output.mp4)

          HTTP_CODE=$(echo "$UPLOAD_RESP" | tail -1)
          BODY=$(echo "$UPLOAD_RESP" | head -1)

          echo "Upload HTTP $HTTP_CODE: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Upload failed — HTTP $HTTP_CODE"
            exit 1
          fi

          VIDEO_URL="${SUPABASE_URL}/storage/v1/object/public/roofing-videos/${CONTENT_ID}.mp4"
          echo "video_url=${VIDEO_URL}" >> $GITHUB_OUTPUT
          echo "Video URL: $VIDEO_URL"

      - name: Notify webhook — success
        if: success()
        run: |
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content_id\":\"${CONTENT_ID}\",\"video_url\":\"${{ steps.upload.outputs.video_url }}\",\"status\":\"ready\",\"size\":\"${VIDEO_SIZE}\"}"

      - name: Notify webhook — failure
        if: failure()
        run: |
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content_id\":\"${CONTENT_ID}\",\"status\":\"failed\",\"error\":\"GitHub Actions FFmpeg render failed\"}"
